"Silverstone National",
"Snetterton",

"Texas Motor Speedway",
"Watkins Glen",
"Willow Springs",
"Zhuhai"

];

let remainingCars = [...allCars];
let remainingTracks = [...allTracks];

function pickRandom(list) {

    const index = Math.floor(Math.random() * list.length);
    return list.splice(index,1)[0];

}

function resetIfEmpty() {

    if (remainingCars.length === 0) {
        remainingCars = [...allCars];
        alert("All cars used. Resetting car list.");
    }

    if (remainingTracks.length === 0) {
        remainingTracks = [...allTracks];
        alert("All tracks used. Resetting track list.");
    }

}

function randomize() {

    resetIfEmpty();

    const car = pickRandom(remainingCars);
    const track = pickRandom(remainingTracks);

    document.getElementById("result").innerHTML =
    "<b>Car:</b> " + car +
    "<br><br>" +
    "<b>Track:</b> " + track +
    "<br><br>" +
    "Cars remaining this cycle: " + remainingCars.length +
    "<br>" +
    "Tracks remaining this cycle: " + remainingTracks.length;

}

</script>

let remaining=[...allCars];

function rand(a){
return a[Math.floor(Math.random()*a.length)];
}

function generate(){

if(remaining.length===0){
remaining=[...allCars];
alert("All cars used. List reset.");
}

let i=Math.floor(Math.random()*remaining.length);
let car=remaining[i];
remaining.splice(i,1);

let track=rand(tracks);

let weather=rand([
"Clear",
"Light Cloud",
"Overcast",
"Light Rain",
"Rain",
"Storm",
"Fog"
]);

let hour=Math.floor(Math.random()*24);

let date=new Date(
2020+Math.floor(Math.random()*6),
Math.floor(Math.random()*12),
Math.floor(Math.random()*28)+1
);
